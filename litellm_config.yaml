      tpm_limit: 2000000
      max_tokens: 128000
      timeout: 120
      cost_per_message:
        input: 2.50e-06
        output: 10.00e-06
      tags:
        - fallback
        - production
      num_retries: 3
      retry_policy: exponential_backoff

