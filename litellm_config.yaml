# LiteLLM Configuration for AgentTwister
# Declarative model aliases for all supported providers with cost tracking,
# rate limiting, and fallback chains.
#
# Usage: litellm --config litellm_config.yaml
# Or in Python: from litellm import completion; completion(model_alias, messages)

model_list:
  # ============================================================
  # OPENAI MODELS
  # ============================================================
  - model_name: gpt-4o-primary
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
      rpm_limit: 10000  # Rate limit: requests per minute
      tpm_limit: 2000000  # Rate limit: tokens per minute
      max_tokens: 128000
      timeout: 120
      cost_per_message:
        input: 2.50e-06  # $2.50 per 1M input tokens
        output: 10.00e-06  # $10.00 per 1M output tokens
      tags:
        - primary
        - production
        - multimodal
    fallbacks:
      - gpt-4o-fallback
      - claude-3-5-sonnet-fallback

  - model_name: gpt-4o-fallback
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
