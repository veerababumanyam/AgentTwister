# ============================================================
# GENERAL CONFIGURATION
# ============================================================

# Enable/disable features
litellm_settings:
  # Drop parameters for specific providers
  drop_params: true  # Drop unsupported params silently

  # Set specific timeout for all models
  set_verbose: false  # Disable verbose logging in production

  # Cache configuration for cost optimization
  cache:
    type: "simple"  # Use in-memory cache
    ttl: 3600  # Cache for 1 hour

  # Security settings
  security:
    # Validate API keys before use
    validate_api_keys: true

  # Monitoring and observability
  success_callback: ["prometheus"]  # Export metrics for monitoring
  failure_callback: ["prometheus"]

  # Retry configuration
  num_retries: 3
  retry_policy: exponential_backoff
  retry_wait_min: 1  # Minimum wait between retries (seconds)
  retry_wait_max: 60  # Maximum wait between retries (seconds)

  # Rate limiting configuration
  max_budget: 100.0  # Maximum budget in dollars (for cost tracking)
  budget_refresh_time: 30  # Budget refresh period in days
  master_key: os.environ/LITELLM_MASTER_KEY  # Master key for virtual key management

  # Fallback configuration
  fallbacks:
    - model_list: ["gpt-4o-primary", "claude-3-5-sonnet-primary", "gemini-2-0-flash-primary"]
      allowed_fails: 3  # Switch after 3 consecutive failures
      cooldown_time: 60  # Wait 60 seconds before retrying primary

  # Alerting configuration
  alerting:
    - type: budget
      enabled: true
      threshold: 0.80  # Alert at 80% of budget
    - type: error_rate
      enabled: true
      threshold: 0.10  # Alert at 10% error rate
      time_window: 300  # Over 5 minutes

# ============================================================
# ENVIRONMENT VARIABLES REFERENCE
# ============================================================
# Required environment variables for this configuration:
#
# OpenAI:
#   OPENAI_API_KEY - Your OpenAI API key
#
# Anthropic:
#   ANTHROPIC_API_KEY - Your Anthropic API key
#
# Google:
#   GEMINI_API_KEY - Your Google Gemini API key
#
# Ollama (local):
#   OLLAMA_API_BASE - Ollama server URL (default: http://localhost:11434)
#
# LiteLLM:
#   LITELLM_MASTER_KEY - Master key for virtual key management (optional)
#
# ============================================================
# USAGE EXAMPLES
# ============================================================
#
# Python API:
#   from litellm import completion
#   response = completion(model="analyst-agent", messages=[...])
#
# Proxy Server:
#   litellm --config litellm_config.yaml --port 4000
#
# Docker:
#   docker run -v $(pwd)/litellm_config.yaml:/app/config.yaml \
#     -p 4000:4000 ghcr.io/berriai/litellm:latest \
#     --config /app/config.yaml --port 4000
#
# ============================================================
